<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&family=Ubuntu:wght@300;700&display=swap" rel="stylesheet">
    <title>Viriato Nova</title>
</head>
<body class="w-screen h-screen m-auto bg-gradient-to-b from-purple-900 via-purple-700 to-purple-500" style="font-family: 'Ubuntu', sans-serif;">
    <div class="flex flex-col container place-items-center m-auto p-10 sm:p-28">
        <div class="w-auto h-auto flex text-white">
            <img src="https://avatars.githubusercontent.com/u/81425727?s=400&u=aff870ea3ebd3fc0ede48ee2520b5e46460e5ddb&v=4" alt="Viriato Nova" class="flex-1 w-40 h-auto rounded-full">
            <div class="flex-1 ml-10 mt-2">
                <h1 class="text-5xl font-bold">Viriato Nova</h1> 
                
                <form action="" method="POST" class="mt-6">
                    <label for="email" class="text-lg bg-white p-4 text-gray-700 duration-300 origin-0"></label>
                    <input type="email" name="email" id="email" placeholder=" " class="text-lg appearance-none focus:outline-none bg-transparent"">
                    <button class=" bg-purple-600 hover:bg-purple-500 text-white text-md py-4 rounded-md" type="submit">
                        Submit
                    </button>
                </form>
            </div>
        </div> 
        <p style="font-family: 'Ubuntu Mono', monospace;" class="text-3xl text-left mt-10 text-white">Pagina em construção</p>
    </div>
</body>
</html>
