---
title: ViriatoNova
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&family=Ubuntu:wght@300;700&display=swap"
        rel="stylesheet">
    <title>{{ page.title }}</title>
</head>
<body class="w-full h-full flex flex-col mx-auto bg-black" style="font-family: 'Ubuntu', sans-serif;">
    
    <div id="mobileNav" class="flex sm:hidden w-full h-auto">
        <nav class="w-full h-full p-2 flex">
            <button id="btmenu" class="w-auto h-auto ml-4"><svg  xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#FFFFFF"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
            <div class="w-full flex flex-col items-end mr-4">
                <h2 class="w-full text-xl text-white text-right font-normal tracking-wide">Viriato Nova</h2>
                <p class="w-full text-xs text-gray-400 text-right tracking-widest">Personal Blog</p>
            </div>
        </nav>
    </div>

    <div id="togglePage" class="hidden w-full h-auto">
        <nav class="w-full h-full flex flex-col items-center space-y-2 py-6  tracking-wider text-lg font-semibold text-white">
            <a class="hover:text-pink-600" href=".">Home</a>
            <a class="hover:text-pink-600" href="sobre.html">Sobre</a>
            <a class="hover:text-pink-600" href=".">Projetos</a>
        </nav>
    </div>
    
   {% include header.html %}

   <main class="w-full h-full px-12 flex ">
       <div class="w-full h-full flex border-t border-gray-700 border-opacity-50">
            <section class="w-2/3 h-full flex flex-col justify-center px-4 mt-6">
                {% for post in site.posts %}
                <article class="w-full h-30 p-2 flex rounded-3xl text-white">
                    <img class="w-40 h-auto rounded-xl object-cover object-top" src="assents/images/eu.png" alt="">
                    <div class="w-full h-auto px-4 flex flex-col justify-start">
                        <a class="flex text-2xl py-px text-purple-300 border-b border-gray-700 border-opacity-50" href="{{ post.url }}">{{ post.title }}</a>
                        <div class="flex justify-end items-center py-px mt-2">
                            <div class="w-auto h-auto text-sm font-light">{{ post.date | date: '%B %d, %Y' }}</div>
                            <div class="w-auto h-auto ml-4 px-2 py-px bg-pink-500 text-xs font-light rounded-2xl">{{ post.tags }}</div>
                        </div>
                        <p class="w-full h-auto mt-2 py-2 text-yellow-100 text-sm tracking-wide">{{ post.text }}</p>
                    </div>
                </article>
                {% endfor %}
            </section>
            <aside class="w-1/3 h-full hidden sm:flex flex-col mt-6 px-4 text-white bg-gray-500">
                <h2>barra lateral</h2>
            </aside>
       </div>
   </main>
  
    

    <script type="module" src="/assents/js/main.js"></script>
</body>

</html>
