{% include header.html %}

    <main class="w-full h-full flex p-2">
        <section class="w-3/4 px-4 mx-auto flex flex-col items-center border-r border-light-gray-900">
            <article>
                <h2 class=" py-4 font-black text-3xl tracking-wide">{{ redacao.titulo }}</h2>
                <h3 class="mt-6 font-normal text-lg tracking-wide text-gray-500">{{ redacao.subtitulo }}</h3>
                    
                <div class="flex mt-16 pb-2 relative border-b border-light-gray-900">
                    <a class="mr-6 text-gray-600" href="">
                        <svg class="fill-current text-gray-600 hover:text-purple-700" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#000000"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
                    </a>
                    <a class="mr-6 text-gray-600">
                        <svg fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"></path></svg>
                    </a>
                    <a class="mr-6 text-gray-600">
                        <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01"></path></svg>
                    </a>
                    <a href="">
                        <svg class="fill-current text-gray-600 hover:text-purple-700" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#000000"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
                    </a>
                    <p class="absolute right-0 mt-px text-sm tracking-wider text-purple-900">{{ redacao.publicado }}</p>
                </div>

                <div class="flex mt-4">
                    <img class="w-1/5 mr-2" src="" alt="autor imagem">
                    <p class="text-sm tracking-wider text-purple-900">por: {{ redacao.autor }}</p>
                </div>
                
                <img class="mt-16 px-10" src="{{ redacao.capa.url }}" alt="Imagem da Capa">
                <p class="mt-2 px-10 font-light text-xs text-gray-500">{{ redacao.imagemDescricao }}</p>
                <p class="mt-12 font-light text-body tracking-wide">{{ redacao.corpo }}</p>
            </article>
        </section>

        <aside class="w-1/4 px-4">
            <h2>barra lateral</h2>
        </aside>
    </main>

{% include footer.html %}
