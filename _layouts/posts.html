{% include header.html %}

    <main class="w-full h-full mt-12 px-6 sm:px-12 flex flex-col text-white">
        <header class="w-full h-full flex flex-col sm:flex-row ">
            <h2 class="w-full sm:w-1/2 flex text-4xl sm:text-5xl py-px text-purple-300 text-xl font-normal">{{ page.title }}</h2>
            <div class="w-full sm:w-1/2 mt-2 sm:mt-0 flex sm:justify-end sm:items-end mr-12 py-2">
                <p class="text-md font-light text-center">{{ page.date | date: '%B %d, %Y' }}</p>
                <p class="ml-6 px-2 py-px bg-pink-500 text-md font-light rounded-xl text-center">{{ page.tags }}</p>
            </div>
        </header>
        <article class="w-full h-full sm:px-6 mt-12">
            <p>{{ page.text }}</p>
            <div class="mt-12">{{ content }}</div>
        </article>
    </main>

{% include footer.html %}
